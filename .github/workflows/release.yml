name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format
      - run: pnpm run lint
      - run: pnpm test
      - run: pnpm run build
      - run: pnpm pack
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="manual-${GITHUB_RUN_NUMBER}"
          fi
          gh release create "$tag" ./*.tgz --title "$tag" --notes "Release $tag"
